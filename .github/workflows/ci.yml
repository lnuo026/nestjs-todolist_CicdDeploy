name: CI 

on: 
     push:
          branches: [main]
     pull_request:
          branches: [main]

jobs:
     build-and-test:
          runs-on: ubuntu-latest

          steps:
               - name: Checkout code
                 uses: actions/checkout@v4

               - name: Setup Node.js
                 uses: actions/setup-node@v4
                 with:
                    node-version: '20'
               
               - name: Install dependencies
                 run: npm ci

               - name: Run lint
                 run: npm run lint

               - name: Run unit tests
                 run: npm run test

               - name: Build
                 run: npm run build
     
     deploy:
          runs-on: ubuntu-latest
          needs: build-and-test
          if: github.ref == 'refs/heads/main' && github.event_name == 'push'
          

          steps:
               - name: Configure AWS credentials
                 uses: aws-actions/configure-aws-credentials@v4
                 with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: ${{ secrets.AWS_REGION }}
               - name: Deploy to EC2 via SSM
                 run: |
                    command_id=$(aws ssm send-command \
                      --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
                      --document-name "AWS-RunShellScript" \
                      --comment "Deploy from GitHub Actions" \
                      --parameters '{"commands":["set -e","git config --global --add safe.directory /home/ubuntu/nestjs","cd /home/ubuntu/nestjs/todolist","git pull","sudo docker compose -f infra/docker/docker-compose.yml up -d --build"],"workingDirectory":["/home/ubuntu/nestjs/todolist"]}' \
                      --query "Command.CommandId" \
                      --output text)

                    echo "Command sent, ID: $command_id"

                    aws ssm wait command-executed \
                      --command-id "$command_id" \
                      --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

                    status=$(aws ssm get-command-invocation \
                      --command-id "$command_id" \
                      --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                      --query "Status" --output text)

                    echo "Deploy status: $status"

                    aws ssm get-command-invocation \
                      --command-id "$command_id" \
                      --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                      --query "Status" --output text

                      if [ "$status" != "Success" ]; then
                        echo "Deployment failed with status: $status"
                        aws ssm get-command-invocation \
                          --command-id "$command_id" \
                          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                          --query "StandardErrorContent" --output text
                        exit 1
                      fi