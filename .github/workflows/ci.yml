name: CI 

on: 
     push:
          branches: [main]
     pull_request:
          branches: [main]
     workflow_dispatch:     

jobs:
     build-and-test:
          runs-on: ubuntu-latest
          steps:
               - name: Checkout code
                 uses: actions/checkout@v4

               - name: Setup Node.js
                 uses: actions/setup-node@v4
                 with:
                    node-version: '24'
               
               - name: Install dependencies
                 run: npm ci

               - name: Run lint
                 run: npm run lint

               - name: Run unit tests
                 run: npm run test

               - name: Build
                 run: npm run build
                    
     build-and-push:
          runs-on: ubuntu-latest
          needs: build-and-test
          if: github.ref == 'refs/heads/main' && (github.event_name == 'push' ||github.event_name == 'workflow_dispatch')
          permissions:
               contents: read
               packages: write
          steps:
               - name: Checkout code
                 uses: actions/checkout@v4

               - name: Set up Docker Buildx
                 uses: docker/setup-buildx-action@v3

               - name: Log in to GitHub Container Registry
                 uses: docker/login-action@v3
                 with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
              
               - name: Build and push Docker image
                 uses: docker/build-push-action@v5
                 with:
                    context: .
                    file: infra/docker/backend.Dockerfile
                    push: true
                    tags: ghcr.io/lnuo026/nestjs-todolist_cicddeploy:latest
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
     
     deploy:
          runs-on: ubuntu-latest
          needs: build-and-push
          if: github.ref == 'refs/heads/main' && (github.event_name == 'push' ||github.event_name == 'workflow_dispatch')
          

          steps:
               - name: Configure AWS credentials
                 uses: aws-actions/configure-aws-credentials@v4
                 with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: ${{ secrets.AWS_REGION }}
               - name: Deploy to EC2 via SSM
                 run: |
                    command_id=$(aws ssm send-command \
                      --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
                      --document-name "AWS-RunShellScript" \
                      --comment "Deploy from GitHub Actions" \
                      --parameters '{"commands":["set -e","git config --system --add safe.directory /home/ubuntu/nestjs","cd /home/ubuntu/nestjs","git pull","sudo docker pull ghcr.io/lnuo026/nestjs-todolist_cicddeploy:latest","sudo docker compose -f infra/docker/docker-compose.yml up -d","sudo docker system prune -f"],"workingDirectory":["/home/ubuntu/nestjs"]}' \
                      --query "Command.CommandId" \
                      --output text)

                    echo "Command sent, ID: $command_id"

                    echo "Waiting for command to complete (max 15 minutes)..."

                    for i in $(seq 1 90); do
                      status=$(aws ssm get-command-invocation \
                        --command-id "$command_id" \
                        --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                        --query "Status" --output text 2>/dev/null || echo "Pending")

                      echo "Attempt $i/90: $status"

                      if [ "$status" = "Success" ] || [ "$status" = "Failed" ]|| \
                         [ "$status" = "Cancelled" ] || [ "$status" = "TimedOut" ]; then
                         
                         break
                      fi
                      sleep 10
                    done

                    echo "Deploy status: $status"

                      if [ "$status" != "Success" ]; then
                        echo "Deployment failed with status: $status"
                        echo "❌STDOUT❌"
                        aws ssm get-command-invocation \
                        --command-id "$command_id" \
                        --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                        --query "StandardOutputContent" --output text
                        echo "❌STDERR❌"
                        aws ssm get-command-invocation \
                          --command-id "$command_id" \
                          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                          --query "StandardErrorContent" --output text
                        exit 1
                      fi

               - name: Verify deployment health
                 run: |
                    echo "Waiting for container to start..."
                    sleep 10
                    for i in $(seq 1 15); do 
                    if curl -sf https://api.lnuo.me/health > /dev/null;then 
                       echo "Health check passed on attempt $i"
                       exit 0
                      fi
                      echo "Attempt $i/15 failed, retrying ..."
                      sleep 3
                    done
                    echo "Health check failed after 15 attempts"
                    exit 1